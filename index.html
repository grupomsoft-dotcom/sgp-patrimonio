<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP Online - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #telaLogin { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; }
        #sistemaConteudo { display: none; }
        
        /* Estilos do Dashboard */
        .dash-card { border: none; border-radius: 12px; color: white; transition: transform 0.2s; }
        .dash-card:hover { transform: translateY(-5px); }
        .bg-total { background: linear-gradient(45deg, #2980b9, #3498db); }
        .bg-valor { background: linear-gradient(45deg, #27ae60, #2ecc71); }
        .bg-maior { background: linear-gradient(45deg, #8e44ad, #9b59b6); }
        
        .img-patrimonio { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="telaLogin">
        <div class="login-box shadow text-center">
            <h3>SGP | Login</h3>
            <form id="formLogin" class="mt-4">
                <input type="email" id="loginEmail" class="form-control mb-3" placeholder="E-mail" required>
                <input type="password" id="loginSenha" class="form-control mb-3" placeholder="Senha" required>
                <button type="submit" class="btn btn-primary w-100">Entrar</button>
                <div id="loginErro" class="text-danger mt-2 small"></div>
            </form>
        </div>
    </div>

    <div id="sistemaConteudo">
        <nav class="navbar navbar-dark bg-dark mb-4">
            <div class="container">
                <span class="navbar-brand">SGP | Painel Administrativo</span>
                <button class="btn btn-outline-light btn-sm" onclick="fazerLogout()">Sair</button>
            </div>
        </nav>

        <div class="container">
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="card dash-card bg-total shadow-sm">
                        <div class="card-body text-center">
                            <h6 class="text-uppercase small">Total de Itens</h6>
                            <h2 id="dashTotalItens">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card dash-card bg-valor shadow-sm">
                        <div class="card-body text-center">
                            <h6 class="text-uppercase small">Patrimônio Total</h6>
                            <h2 id="dashValorTotal">R$ 0,00</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card dash-card bg-maior shadow-sm">
                        <div class="card-body text-center">
                            <h6 class="text-uppercase small">Maior Inventário</h6>
                            <h2 id="dashMaiorIgreja">--</h2>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-lg-4 mb-4">
                    <div class="card shadow-sm">
                        <div class="card-header bg-white font-weight-bold">Gerenciar Item</div>
                        <div class="card-body">
                            <form id="formPatrimonio">
                                <input type="hidden" id="editId">
                                <div class="mb-2">
                                    <label class="small">Congregação</label>
                                    <select id="congregacao" class="form-select form-select-sm" required>
                                        <option value="">Selecione...</option>
                                        <option value="Sede Central">Sede Central</option>
                                        <option value="Congregação A">Congregação A</option>
                                        <option value="Congregação B">Congregação B</option>
                                    </select>
                                </div>
                                <div class="mb-2">
                                    <label class="small">Nome do Item</label>
                                    <input type="text" id="nomeItem" class="form-control form-control-sm" required>
                                </div>
                                <div class="mb-2">
                                    <label class="small">Valor (R$)</label>
                                    <input type="number" step="0.01" id="valorItem" class="form-control form-control-sm" required>
                                </div>
                                <div class="mb-2">
                                    <label class="small">Observação</label>
                                    <textarea id="obsItem" class="form-control form-control-sm" rows="2"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="small">Foto</label>
                                    <input type="file" id="fotoItem" class="form-control form-control-sm" accept="image/*">
                                </div>
                                <button type="submit" id="btnSalvar" class="btn btn-success btn-sm w-100">Salvar na Nuvem</button>
                                <button type="button" id="btnCancelar" class="btn btn-light btn-sm w-100 mt-1 d-none" onclick="cancelarEdicao()">Cancelar</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-3">
                                <input type="text" id="buscaNome" class="form-control form-control-sm w-50" placeholder="Buscar..." onkeyup="filtrarItens()">
                                <button class="btn btn-outline-success btn-sm" onclick="exportarExcel()">📊 Excel</button>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-sm table-hover align-middle">
                                    <thead>
                                        <tr class="table-light">
                                            <th>Foto</th>
                                            <th>Item</th>
                                            <th>Valor</th>
                                            <th>Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody id="listaPatrimonio"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
