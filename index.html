<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP 3.7 - Histórico e Movimentação</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root { --primary-dark: #2c3e50; --accent-blue: #3498db; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        #telaLogin { position: fixed; inset: 0; background: var(--primary-dark); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        #sistemaConteudo { display: none; }
        .nav-tabs .nav-link { color: #666; font-weight: 500; border: none; padding: 12px 25px; cursor: pointer; }
        .nav-tabs .nav-link.active { color: var(--accent-blue); border-bottom: 3px solid var(--accent-blue); background: transparent; }
        .dash-card { border: none; border-radius: 12px; color: white; margin-bottom: 15px; }
        .bg-blue { background: linear-gradient(45deg, #2980b9, #3498db); }
        .bg-green { background: linear-gradient(45deg, #27ae60, #2ecc71); }
        .bg-purple { background: linear-gradient(45deg, #8e44ad, #9b59b6); }
        .img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; }
        .view-card-img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; }
        .timeline-item { border-left: 2px solid var(--accent-blue); padding-left: 15px; margin-bottom: 15px; position: relative; }
        .timeline-item::before { content: ''; position: absolute; left: -7px; top: 0; width: 12px; height: 12px; background: var(--accent-blue); border-radius: 50%; }
        
        @media print {
            body * { visibility: hidden; }
            #areaImpressao, #areaImpressao * { visibility: visible; }
            #areaImpressao { display: block !important; position: absolute; left: 0; top: 0; width: 100%; text-align: center; }
            .etiqueta-box { border: 2px solid #000; padding: 15px; display: inline-block; width: 280px; border-radius: 10px; }
        }
    </style>
</head>
<body>

    <div id="telaLogin">
        <div class="login-card text-center">
            <h2 class="mb-4">SGP 3.7</h2>
            <form id="formLogin">
                <input type="email" id="loginEmail" class="form-control mb-3" placeholder="E-mail" required>
                <input type="password" id="loginSenha" class="form-control mb-3" placeholder="Senha" required>
                <button type="submit" class="btn btn-primary w-100 py-2">Entrar</button>
            </form>
        </div>
    </div>

    <div id="sistemaConteudo">
        <nav class="navbar navbar-dark bg-dark shadow-sm">
            <div class="container">
                <span class="navbar-brand"><strong>SGP</strong> | Logística Eclesiástica</span>
                <div class="d-flex gap-2">
                    <button class="btn btn-primary btn-sm" onclick="abrirScanner()">📷 Escanear QR</button>
                    <button class="btn btn-outline-light btn-sm" onclick="fazerLogout()">Sair</button>
                </div>
            </div>
        </nav>

        <div class="container mt-4">
            <ul class="nav nav-tabs mb-4">
                <li class="nav-link active" data-bs-toggle="tab" data-bs-target="#pane-patrimonio">Patrimônio</li>
                <li class="nav-link" data-bs-toggle="tab" data-bs-target="#pane-historico">Histórico Global</li>
                <li class="nav-link" data-bs-toggle="tab" data-bs-target="#pane-congregacoes">Configurações</li>
            </ul>

            <div class="tab-content">
                <div class="tab-pane fade show active" id="pane-patrimonio">
                    <div class="row mb-3">
                        <div class="col-md-4"><div class="card dash-card bg-blue shadow-sm"><div class="card-body"><h6>Itens</h6><h2 id="dashItens">0</h2></div></div></div>
                        <div class="col-md-4"><div class="card dash-card bg-green shadow-sm"><div class="card-body"><h6>Valor Total</h6><h2 id="dashValor">R$ 0,00</h2></div></div></div>
                        <div class="col-md-4"><div class="card dash-card bg-purple shadow-sm"><div class="card-body"><h6>Maior Unidade</h6><h2 id="dashUnidade">--</h2></div></div></div>
                    </div>
                    <div class="row">
                        <div class="col-lg-4">
                            <div class="card shadow-sm mb-4">
                                <div class="card-header bg-white"><strong>Cadastro</strong></div>
                                <div class="card-body">
                                    <form id="formPatrimonio">
                                        <input type="hidden" id="patId">
                                        <div class="mb-2"><label class="small">Congregação Atual</label><select id="patCongregacao" class="form-select form-select-sm" required></select></div>
                                        <div class="mb-2"><label class="small">Nome do Item</label><input type="text" id="patNome" class="form-control form-control-sm" required></div>
                                        <div class="mb-2"><label class="small">Valor (R$)</label><input type="number" step="0.01" id="patValor" class="form-control form-control-sm" required></div>
                                        <div class="mb-2"><label class="small">Observações</label><textarea id="patObs" class="form-control form-control-sm" rows="2"></textarea></div>
                                        <div class="mb-3"><label class="small">Foto</label><input type="file" id="patFoto" class="form-control form-control-sm" accept="image/*"></div>
                                        <button type="submit" id="btnSalvarPat" class="btn btn-primary btn-sm w-100">Salvar Item</button>
                                        <button type="button" id="btnCancelaPat" class="btn btn-light btn-sm w-100 mt-1 d-none" onclick="resetaPatrimonio()">Cancelar</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-8">
                            <div class="card shadow-sm"><div class="card-body">
                                <input type="text" id="buscaPat" class="form-control form-control-sm mb-3" placeholder="Buscar..." onkeyup="filtrarPatrimonio()">
                                <div class="table-responsive"><table class="table table-hover align-middle small"><thead><tr class="table-light"><th>Foto</th><th>Item</th><th>Unidade</th><th>Valor</th><th>Ações</th></tr></thead><tbody id="listaPatrimonio"></tbody></table></div>
                            </div></div>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="pane-historico">
                    <div class="card shadow-sm"><div class="card-body">
                        <h5>Últimas Movimentações</h5>
                        <hr>
                        <div id="listaHistoricoGlobal"></div>
                    </div></div>
                </div>

                <div class="tab-pane fade" id="pane-congregacoes">
                    <div class="row">
                        <div class="col-md-4">
                            <form id="formCongregacao" class="card p-3 shadow-sm">
                                <input type="hidden" id="congId">
                                <input type="text" id="congNome" class="form-control mb-2" placeholder="Nome da Unidade" required>
                                <button type="submit" class="btn btn-dark btn-sm">Adicionar Unidade</button>
                            </form>
                        </div>
                        <div class="col-md-8"><table class="table table-sm"><tbody id="listaCongregacoes"></tbody></table></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalScanner" data-bs-backdrop="static" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5>Escanear</h5><button type="button" class="btn-close" data-bs-dismiss="modal" onclick="pararScanner()"></button></div><div class="modal-body"><div id="reader"></div></div></div></div></div>

    <div class="modal fade" id="modalView" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-body p-4">
                    <div class="row">
                        <div class="col-md-5 text-center">
                            <img id="viewFoto" src="" class="view-card-img shadow-sm">
                            <div class="d-grid gap-2">
                                <button class="btn btn-warning" onclick="abrirModalTransferir()">🔄 Transferir de Unidade</button>
                                <button class="btn btn-outline-primary" onclick="irParaEditar()">✏️ Editar Dados</button>
                                <button class="btn btn-light" data-bs-dismiss="modal">Fechar</button>
                            </div>
                        </div>
                        <div class="col-md-7 border-start">
                            <h3 id="viewNome">Nome</h3>
                            <p class="mb-1"><strong>Onde está agora:</strong> <span id="viewCongregacao" class="badge bg-success">--</span></p>
                            <p class="mb-3"><strong>Valor:</strong> <span id="viewValor">--</span></p>
                            <hr>
                            <h6>📜 Histórico do Item</h6>
                            <div id="viewTimeline" style="max-height: 250px; overflow-y: auto;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalTransferir" tabindex="-1">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header"><h6>Destino da Transferência</h6></div>
                <div class="modal-body">
                    <select id="transfDestino" class="form-select mb-3"></select>
                    <button class="btn btn-primary w-100" onclick="confirmarTransferencia()">Confirmar Mudança</button>
                </div>
            </div>
        </div>
    </div>

    <div id="areaImpressao"><div class="etiqueta-box"><h5 id="printIgreja"></h5><div id="qrcode"></div><p id="printItem"></p><span id="printData"></span></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
