<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP PRO v3.8 - Gestão Patrimonial</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root { --bg: #f8fafc; --dark: #0f172a; --primary: #2563eb; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; margin: 0; }

        /* LOGIN */
        #telaLogin { position: fixed; inset: 0; background: var(--dark); z-index: 3000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 2.5rem; border-radius: 1.5rem; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }

        /* LAYOUT */
        .sidebar { width: 260px; height: 100vh; background: var(--dark); position: fixed; left: 0; top: 0; padding: 1.5rem; z-index: 1000; transition: 0.3s; }
        .main-content { margin-left: 260px; padding: 2rem; min-height: 100vh; }
        
        .nav-link-custom { display: flex; align-items: center; padding: 0.8rem 1rem; color: #94a3b8; border-radius: 0.5rem; text-decoration: none; margin-bottom: 0.5rem; cursor: pointer; transition: 0.2s; }
        .nav-link-custom:hover, .nav-link-custom.active { background: #1e293b; color: white; }
        .nav-link-custom i { margin-right: 12px; width: 20px; text-align: center; }

        /* COMPONENTES */
        .card { border: none; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 1.5rem; }
        .img-preview { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; cursor: pointer; border: 1px solid #ddd; }
        .stat-icon { width: 45px; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; font-size: 1.2rem; }
        
        /* MODAL IMAGEM */
        .view-img { width: 100%; height: 280px; object-fit: cover; border-radius: 1rem; }
        .hist-item { padding: 8px 12px; border-left: 3px solid var(--primary); background: #f1f5f9; margin-bottom: 6px; border-radius: 0 6px 6px 0; font-size: 0.8rem; }

        /* IMPRESSÃO RESTRITA */
        #areaImpressao { display: none; }
        @media print {
            body * { visibility: hidden !important; }
            #areaImpressao, #areaImpressao * { visibility: visible !important; display: block !important; }
            #areaImpressao { position: absolute; left: 0; top: 0; width: 100%; text-align: center; }
            .etiqueta-box { border: 2px solid #000; padding: 15px; display: inline-block !important; width: 260px; background: white !important; border-radius: 8px; margin-top: 20px; }
            #qrcode canvas, #qrcode img { display: block !important; margin: 10px auto !important; }
        }

        @media (max-width: 992px) { .sidebar { left: -260px; } .main-content { margin-left: 0; } .sidebar.active { left: 0; } }
    </style>
</head>
<body>

    <div id="telaLogin">
        <div class="login-card text-center">
            <div class="bg-primary text-white d-inline-block p-3 rounded-4 mb-3"><i class="fas fa-church fa-2x"></i></div>
            <h3 class="fw-bold">SGP PRO</h3>
            <form id="formLogin" class="mt-4 text-start">
                <div class="mb-3"><label class="small fw-bold">E-mail</label><input type="email" id="loginEmail" class="form-control" required></div>
                <div class="mb-4"><label class="small fw-bold">Senha</label><input type="password" id="loginSenha" class="form-control" required></div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">ENTRAR NO PAINEL</button>
            </form>
        </div>
    </div>

    <div id="sistemaConteudo" style="display:none;">
        <aside class="sidebar">
            <h4 class="text-white fw-bold mb-5"><i class="fas fa-layer-group text-primary"></i> SGP ADMIN</h4>
            <div class="nav-link-custom active" onclick="switchTab(this, 'pane-patrimonio')"><i class="fas fa-boxes-stacked"></i> Patrimônio</div>
            <div class="nav-link-custom" onclick="switchTab(this, 'pane-historico')"><i class="fas fa-history"></i> Movimentações</div>
            <div class="nav-link-custom" onclick="switchTab(this, 'pane-congregacoes')"><i class="fas fa-map-location-dot"></i> Unidades</div>
            <div class="mt-5 border-top border-secondary pt-4">
                <button class="btn btn-outline-danger btn-sm w-100" onclick="fazerLogout()"><i class="fas fa-power-off"></i> Sair</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold m-0">Gestão de Ativos</h3>
                <button class="btn btn-primary px-4 rounded-pill shadow-sm fw-bold" onclick="abrirScanner()"><i class="fas fa-qrcode me-2"></i> ESCANEAR QR</button>
            </header>

            <div class="tab-content">
                <div class="tab-pane fade show active" id="pane-patrimonio">
                    <div class="row g-3 mb-4">
                        <div class="col-md-4"><div class="card p-3"><div class="stat-icon bg-primary text-white"><i class="fas fa-box"></i></div><small class="text-muted fw-bold">ITENS TOTAIS</small><h3 id="dashItens" class="fw-bold m-0">0</h3></div></div>
                        <div class="col-md-4"><div class="card p-3"><div class="stat-icon bg-success text-white"><i class="fas fa-sack-dollar"></i></div><small class="text-muted fw-bold">VALOR ESTIMADO</small><h3 id="dashValor" class="fw-bold m-0">R$ 0,00</h3></div></div>
                        <div class="col-md-4"><div class="card p-3"><div class="stat-icon bg-warning text-white"><i class="fas fa-place-of-worship"></i></div><small class="text-muted fw-bold">TOP UNIDADE</small><h3 id="dashUnidade" class="fw-bold m-0">--</h3></div></div>
                    </div>

                    <div class="row g-4">
                        <div class="col-lg-4">
                            <div class="card p-4">
                                <h5 class="fw-bold mb-3 border-bottom pb-2">Novo Cadastro</h5>
                                <form id="formPatrimonio">
                                    <div class="mb-2"><label class="small fw-bold">Unidade Destino</label><select id="patCongregacao" class="form-select bg-light border-0" required></select></div>
                                    <div class="mb-2"><label class="small fw-bold">Nome do Ativo</label><input type="text" id="patNome" class="form-control bg-light border-0" placeholder="Ex: Projetor Epson" required></div>
                                    <div class="mb-2"><label class="small fw-bold">Número de Série</label><input type="text" id="patSerie" class="form-control bg-light border-0" placeholder="Ex: SN-9988X"></div>
                                    <div class="mb-2"><label class="small fw-bold">Valor (R$)</label><input type="number" step="0.01" id="patValor" class="form-control bg-light border-0" required></div>
                                    <div class="mb-3"><label class="small fw-bold">Foto do Bem</label><input type="file" id="patFoto" class="form-control bg-light border-0" accept="image/*"></div>
                                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2">CADASTRAR ITEM</button>
                                </form>
                            </div>
                        </div>
                        <div class="col-lg-8">
                            <div class="card p-4">
                                <input type="text" id="buscaPat" class="form-control mb-3 rounded-pill px-4" placeholder="🔍 Pesquisar por nome, série ou unidade..." onkeyup="filtrarPatrimonio()">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle">
                                        <thead class="table-light"><tr><th>Foto</th><th>Patrimônio</th><th>Local</th><th>Ações</th></tr></thead>
                                        <tbody id="listaPatrimonio"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="pane-historico"><div class="card p-4"><h5>Histórico Global</h5><hr><div id="listaHistoricoGlobal"></div></div></div>
                <div class="tab-pane fade" id="pane-congregacoes">
                    <div class="card p-4"><h5>Unidades / Igrejas</h5>
                        <form id="formCongregacao" class="d-flex gap-2 my-3"><input type="text" id="congNome" class="form-control" placeholder="Nome da Congregação" required><button type="submit" class="btn btn-dark px-4">Salvar</button></form>
                        <table class="table"><tbody id="listaCongregacoes"></tbody></table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="modalEdicao" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 1.5rem;">
                <div class="modal-header bg-dark text-white border-0 py-3 px-4" style="border-radius: 1.5rem 1.5rem 0 0;">
                    <h5 class="modal-title fw-bold"><i class="fas fa-edit me-2"></i> Editar Ativo</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formEdicaoDinamica">
                        <input type="hidden" id="editId">
                        <div class="mb-3"><label class="small fw-bold">Unidade</label><select id="editCongregacao" class="form-select bg-light border-0" required></select></div>
                        <div class="mb-3"><label class="small fw-bold">Nome do Bem</label><input type="text" id="editNome" class="form-control bg-light border-0" required></div>
                        <div class="mb-3"><label class="small fw-bold">Nº de Série</label><input type="text" id="editSerie" class="form-control bg-light border-0"></div>
                        <div class="mb-3"><label class="small fw-bold">Valor (R$)</label><input type="number" step="0.01" id="editValor" class="form-control bg-light border-0" required></div>
                        <div class="mb-4"><label class="small fw-bold">Alterar Foto</label><input type="file" id="editFoto" class="form-control bg-light border-0" accept="image/*"></div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary fw-bold py-2 shadow-sm">SALVAR ALTERAÇÕES</button>
                            <button type="button" class="btn btn-light fw-bold" data-bs-dismiss="modal">CANCELAR</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalView" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 overflow-hidden" style="border-radius: 1.5rem;">
                <div class="row g-0">
                    <div class="col-md-5"><img id="viewFoto" src="" class="view-img"></div>
                    <div class="col-md-7 p-4">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div><h3 id="viewNome" class="fw-bold mb-0">---</h3><span id="viewCongregacao" class="badge bg-primary rounded-pill">---</span></div>
                            <button class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <p class="text-muted small mb-3">Série: <span id="viewSerie" class="fw-bold text-dark">---</span></p>
                        <h4 id="viewValor" class="text-success fw-bold mb-4">R$ 0,00</h4>
                        <label class="small fw-bold text-muted d-block mb-2">MOVIMENTAÇÕES RECENTES</label>
                        <div id="viewTimeline" class="mb-4" style="max-height: 150px; overflow-y: auto;"></div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-warning fw-bold flex-grow-1" onclick="abrirModalTransferir()"><i class="fas fa-exchange-alt me-2"></i>MOVER</button>
                            <button class="btn btn-light" onclick="irParaEditar()"><i class="fas fa-pen"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalScanner" tabindex="-1"><div class="modal-dialog modal-sm modal-dialog-centered"><div class="modal-content border-0"><div id="reader"></div><button class="btn btn-danger btn-sm m-2" onclick="pararScanner()" data-bs-dismiss="modal">Fechar Câmera</button></div></div></div>
    <div class="modal fade" id="modalTransferir" tabindex="-1"><div class="modal-dialog modal-sm modal-dialog-centered"><div class="modal-content p-4 text-center border-0 shadow-lg"><h6>Nova Unidade:</h6><select id="transfDestino" class="form-select my-3"></select><button class="btn btn-primary w-100 fw-bold" onclick="confirmarTransferencia()">TRANSFERIR AGORA</button></div></div></div>

    <div id="areaImpressao">
        <div class="etiqueta-box">
            <div id="printIgreja" style="font-size: 9pt; font-weight: bold; border-bottom: 1px solid #000; padding-bottom: 3px; text-transform: uppercase;"></div>
            <div id="qrcode" style="display: flex; justify-content: center;"></div>
            <div id="printItem" style="font-size: 11pt; font-weight: bold; margin-top: 5px;"></div>
            <div id="printSerial" style="font-size: 8pt; color: #555;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="script.js"></script>
    <script>
        function switchTab(el, id) {
            document.querySelectorAll('.nav-link-custom').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('show', 'active'));
            document.getElementById(id).classList.add('show', 'active');
        }
    </script>
</body>
</html>
