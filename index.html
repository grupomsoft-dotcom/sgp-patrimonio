<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP PRO v3.9 - Multi-Acesso</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --dark: #0f172a; --primary: #2563eb; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; }
        .sidebar { width: 260px; height: 100vh; background: var(--dark); position: fixed; left: 0; top: 0; z-index: 2000; transition: 0.3s; padding: 1.5rem; display: flex; flex-direction: column; }
        .main-content { margin-left: 260px; padding: 20px; transition: 0.3s; min-height: 100vh; }
        .nav-link-custom { display: flex; align-items: center; padding: 12px; color: #94a3b8; text-decoration: none; border-radius: 8px; margin-bottom: 5px; cursor: pointer; }
        .nav-link-custom:hover, .nav-link-custom.active { background: #1e293b; color: white; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        #telaLogin { position: fixed; inset: 0; background: var(--dark); z-index: 3000; display: flex; align-items: center; justify-content: center; }
        @media (max-width: 992px) { .sidebar { left: -260px; } .sidebar.active { left: 0; } .main-content { margin-left: 0; } }
        .img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
        #areaImpressao { display: none; }
        @media print { body * { visibility: hidden !important; } #areaImpressao, #areaImpressao * { visibility: visible !important; display: block !important; } #areaImpressao { position: absolute; left: 0; top: 0; width: 100%; text-align: center; } .etiqueta-box { border: 2px solid #000; padding: 15px; display: inline-block; width: 260px; } }
    </style>
</head>
<body>

    <div id="telaLogin">
        <div class="bg-white p-4 rounded-4 shadow" style="width: 100%; max-width: 380px;">
            <h3 class="fw-bold text-center mb-4">SGP PRO</h3>
            <form id="formLogin">
                <input type="email" id="loginEmail" class="form-control mb-2" placeholder="E-mail" required>
                <input type="password" id="loginSenha" class="form-control mb-3" placeholder="Senha" required>
                <button type="submit" class="btn btn-primary w-100 fw-bold">ENTRAR</button>
            </form>
        </div>
    </div>

    <div id="sistemaConteudo" style="display:none;">
        <aside class="sidebar">
            <h4 class="text-white fw-bold mb-2">SGP PRO</h4>
            <div id="infoUser" class="text-muted small mb-4">Carregando...</div>
            
            <div class="nav-link-custom active" onclick="switchTab(this, 'pane-patrimonio')"><i class="fas fa-boxes me-2"></i> Patrimônio</div>
            <div class="nav-link-custom" onclick="switchTab(this, 'pane-transferir')"><i class="fas fa-exchange-alt me-2"></i> Transferir (Scan)</div>
            <div class="nav-link-custom" onclick="switchTab(this, 'pane-historico')"><i class="fas fa-history me-2"></i> Histórico</div>
            
            <div id="menuAdminOnly">
                <div class="nav-link-custom" onclick="switchTab(this, 'pane-congregacoes')"><i class="fas fa-church me-2"></i> Unidades / Usuários</div>
            </div>

            <div class="mt-auto"><button class="btn btn-outline-danger w-100" onclick="fazerLogout()">Sair</button></div>
        </aside>

        <main class="main-content">
            <header class="d-flex align-items-center justify-content-between mb-4">
                <div class="d-flex align-items-center">
                    <button class="btn btn-dark d-lg-none me-3" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                    <h3 class="fw-bold m-0" id="pageTitle">Painel</h3>
                </div>
                <button id="btnInstalar" class="btn btn-outline-primary btn-sm d-none fw-bold">INSTALAR APP</button>
            </header>

            <div id="pane-patrimonio" class="tab-pane active">
                <div class="row g-3">
                    <div class="col-md-4">
                        <div class="card p-3 border-0 shadow-sm">
                            <h5 class="fw-bold mb-3">Novo Item</h5>
                            <form id="formPatrimonio">
                                <label class="small fw-bold">Unidade</label>
                                <select id="patCongregacao" class="form-select mb-2" required></select>
                                <label class="small fw-bold">Item</label>
                                <input type="text" id="patNome" class="form-control mb-2" required>
                                <label class="small fw-bold">Série/Patrimônio</label>
                                <input type="text" id="patSerie" class="form-control mb-2">
                                <label class="small fw-bold">Valor</label>
                                <input type="number" step="0.01" id="patValor" class="form-control mb-3" required>
                                <label class="small fw-bold">Foto</label>
                                <input type="file" id="patFoto" class="form-control mb-3" accept="image/*">
                                <button type="submit" class="btn btn-primary w-100">CADASTRAR</button>
                            </form>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card p-3 border-0 shadow-sm">
                            <div class="table-responsive">
                                <table class="table align-middle">
                                    <thead><tr><th>Item</th><th>Unidade</th><th>Ações</th></tr></thead>
                                    <tbody id="listaPatrimonio"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="pane-transferir" class="tab-pane">
                <div class="card p-4 border-0 shadow-sm text-center">
                    <button class="btn btn-primary btn-lg rounded-pill mb-4" onclick="abrirScannerParaMover()"><i class="fas fa-qrcode me-2"></i> ESCANEAR PARA MOVER</button>
                    <div id="formMoverArea" class="d-none text-start border-top pt-3">
                        <div class="alert alert-info">
                            <strong>Item:</strong> <span id="moverNomeItem">---</span><br>
                            <strong>Local Atual:</strong> <span id="moverLocalAtual">---</span>
                        </div>
                        <label class="fw-bold small">Mover para qual Unidade?</label>
                        <select id="transfDestinoFinal" class="form-select mb-3"></select>
                        <button class="btn btn-success w-100 py-3 fw-bold" onclick="executarTransferenciaPagina()">CONFIRMAR TRANSFERÊNCIA</button>
                    </div>
                </div>
            </div>

            <div id="pane-historico" class="tab-pane">
                <div class="card p-3 border-0 shadow-sm"><h5>Histórico</h5><hr><div id="listaHistoricoGlobal"></div></div>
            </div>

            <div id="pane-congregacoes" class="tab-pane">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card p-3 border-0 shadow-sm mb-3">
                            <h5>Nova Unidade</h5>
                            <form id="formCongregacao" class="d-flex gap-2 my-2"><input type="text" id="congNome" class="form-control" placeholder="Nome da Igreja"><button type="submit" class="btn btn-dark">Add</button></form>
                            <table class="table"><tbody id="listaCongregacoes"></tbody></table>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card p-3 border-0 shadow-sm">
                            <h5>Acessos (Dirigentes)</h5>
                            <form id="formUsuario" class="my-2">
                                <input type="email" id="userEmail" class="form-control mb-2" placeholder="Email do Dirigente" required>
                                <select id="userCong" class="form-select mb-2" required></select>
                                <button type="submit" class="btn btn-primary w-100 btn-sm">Liberar Acesso</button>
                            </form>
                            <table class="table small"><tbody id="listaUsuarios"></tbody></table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="modalEdicao" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content p-4"><form id="formEdicaoDinamica"><input type="hidden" id="editId"><input type="text" id="editNome" class="form-control mb-2"><input type="text" id="editSerie" class="form-control mb-2"><select id="editCongregacao" class="form-select mb-3"></select><button type="submit" class="btn btn-primary w-100">ATUALIZAR</button></form></div></div></div>
    <div class="modal fade" id="modalScanner" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content bg-transparent border-0"><div id="reader"></div><button class="btn btn-danger mt-3" onclick="fecharScanner()">FECHAR</button></div></div></div>
    <div id="areaImpressao"><div class="etiqueta-box"><div id="printIgreja"></div><div id="qrcode"></div><div id="printItem"></div><div id="printSerial"></div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script type="module" src="script.js"></script>
    <script>
        function toggleSidebar() { document.querySelector('.sidebar').classList.toggle('active'); }
        function switchTab(el, id) {
            if(window.innerWidth < 992) toggleSidebar();
            document.querySelectorAll('.nav-link-custom').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('pageTitle').innerText = el.innerText.trim();
        }
    </script>
</body>
</html>
