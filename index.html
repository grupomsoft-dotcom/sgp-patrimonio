<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP Online - Gestão de Patrimônio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .navbar { background-color: #2c3e50; }
        .card { border: none; border-radius: 10px; margin-bottom: 20px; }
        .card-header { background-color: #34495e; color: white; font-weight: bold; }
        .btn-success { background-color: #27ae60; border: none; }
        .table-container { max-height: 500px; overflow-y: auto; }
        .img-patrimonio { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
        .editando { border: 2px solid #f39c12 !important; }
        .status-online { color: #27ae60; font-size: 0.8em; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-4">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand" href="#">SGP Online | Sincronizado</a>
            <span class="status-online">● Banco de Dados Conectado</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-lg-4">
                <div class="card shadow" id="cardFormulario">
                    <div class="card-header" id="tituloForm">Cadastrar Novo Bem</div>
                    <div class="card-body">
                        <form id="formPatrimonio">
                            <input type="hidden" id="editId">
                            <div class="mb-3">
                                <label class="form-label">Congregação</label>
                                <select class="form-select" id="congregacao" required>
                                    <option value="">Selecione...</option>
                                    <option value="Sede Central">Sede Central</option>
                                    <option value="Congregação A">Congregação A</option>
                                    <option value="Congregação B">Congregação B</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Nome do Item</label>
                                <input type="text" class="form-control" id="nomeItem" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Valor (R$)</label>
                                <input type="number" step="0.01" class="form-control" id="valorItem" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Observações</label>
                                <textarea class="form-control" id="obsItem" rows="2"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Foto (Opcional)</label>
                                <input type="file" class="form-control" id="fotoItem" accept="image/*">
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" id="btnSalvar" class="btn btn-success">Salvar na Nuvem</button>
                                <button type="button" id="btnCancelar" class="btn btn-secondary d-none" onclick="cancelarEdicao()">Cancelar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card shadow">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>Inventário em Tempo Real</span>
                        <button class="btn btn-light btn-sm" onclick="exportarExcel()">📊 Excel</button>
                    </div>
                    <div class="card-body">
                        <div class="row g-2 mb-3">
                            <div class="col-md-7"><input type="text" id="buscaNome" class="form-control" placeholder="Buscar..." onkeyup="filtrarItens()"></div>
                            <div class="col-md-5">
                                <select id="filtroCongregacao" class="form-select" onchange="filtrarItens()">
                                    <option value="">Todas as Igrejas</option>
                                    <option value="Sede Central">Sede Central</option>
                                    <option value="Congregação A">Congregação A</option>
                                    <option value="Congregação B">Congregação B</option>
                                </select>
                            </div>
                        </div>
                        <div class="table-responsive table-container">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Foto</th>
                                        <th>Item</th>
                                        <th>Igreja</th>
                                        <th>Valor</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="listaPatrimonio"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
