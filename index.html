<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP Seguro - Gestão de Patrimônio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; }
        /* Tela de Login */
        #telaLogin { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #2c3e50; z-index: 1000; display: flex; align-items: center; justify-content: center; 
        }
        .login-box { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        /* Sistema (Escondido inicialmente) */
        #sistemaConteudo { display: none; }
        
        .navbar { background-color: #2c3e50; }
        .card { border: none; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .img-patrimonio { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="telaLogin">
        <div class="login-box text-center">
            <h3 class="mb-4">SGP | Acesso Restrito</h3>
            <form id="formLogin">
                <div class="mb-3 text-start">
                    <label class="form-label">E-mail Cadastrado</label>
                    <input type="email" id="loginEmail" class="form-control" required placeholder="exemplo@igreja.com">
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label">Senha</label>
                    <input type="password" id="loginSenha" class="form-control" required placeholder="******">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Entrar no Sistema</button>
                <div id="loginErro" class="text-danger mt-3 small"></div>
            </form>
        </div>
    </div>

    <div id="sistemaConteudo">
        <nav class="navbar navbar-dark mb-4">
            <div class="container d-flex justify-content-between">
                <a class="navbar-brand" href="#">SGP Online | Administrativo</a>
                <button class="btn btn-outline-light btn-sm" onclick="fazerLogout()">Sair / Sincronizar</button>
            </div>
        </nav>

        <div class="container">
            <div class="row">
                <div class="col-lg-4">
                    <div class="card shadow" id="cardFormulario">
                        <div class="card-header bg-dark text-white" id="tituloForm">Novo Registro</div>
                        <div class="card-body">
                            <form id="formPatrimonio">
                                <input type="hidden" id="editId">
                                <div class="mb-3">
                                    <label class="form-label">Congregação</label>
                                    <select class="form-select" id="congregacao" required>
                                        <option value="">Selecione...</option>
                                        <option value="Sede Central">Sede Central</option>
                                        <option value="Congregação A">Congregação A</option>
                                        <option value="Congregação B">Congregação B</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Nome do Item</label>
                                    <input type="text" class="form-control" id="nomeItem" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Valor (R$)</label>
                                    <input type="number" step="0.01" class="form-control" id="valorItem" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Obs.</label>
                                    <textarea id="obsItem" class="form-control" rows="2"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Foto</label>
                                    <input type="file" id="fotoItem" class="form-control" accept="image/*">
                                </div>
                                <div class="d-grid gap-2">
                                    <button type="submit" id="btnSalvar" class="btn btn-success">Salvar na Nuvem</button>
                                    <button type="button" id="btnCancelar" class="btn btn-secondary d-none" onclick="cancelarEdicao()">Cancelar</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="card shadow">
                        <div class="card-header d-flex justify-content-between align-items-center bg-white text-dark">
                            <span>Patrimônio Atualizado</span>
                            <button class="btn btn-outline-success btn-sm" onclick="exportarExcel()">📊 Excel</button>
                        </div>
                        <div class="card-body">
                            <div class="row g-2 mb-3">
                                <div class="col-md-7"><input type="text" id="buscaNome" class="form-control" placeholder="Pesquisar..." onkeyup="filtrarItens()"></div>
                                <div class="col-md-5">
                                    <select id="filtroCongregacao" class="form-select" onchange="filtrarItens()">
                                        <option value="">Todas as Igrejas</option>
                                        <option value="Sede Central">Sede Central</option>
                                        <option value="Congregação A">Congregação A</option>
                                        <option value="Congregação B">Congregação B</option>
                                    </select>
                                </div>
                            </div>
                            <div class="table-responsive" style="max-height: 500px;">
                                <table class="table table-hover align-middle">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Foto</th>
                                            <th>Item</th>
                                            <th>Localização</th>
                                            <th>Valor</th>
                                            <th>Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody id="listaPatrimonio"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
