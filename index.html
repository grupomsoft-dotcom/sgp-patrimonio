<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP PRO v3.8</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --dark: #0f172a; --primary: #2563eb; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .sidebar { width: 260px; height: 100vh; background: var(--dark); position: fixed; left: 0; top: 0; z-index: 2000; transition: 0.3s; padding: 1.5rem; }
        .main-content { margin-left: 260px; padding: 20px; transition: 0.3s; }
        .nav-link-custom { display: flex; align-items: center; padding: 12px; color: #94a3b8; text-decoration: none; border-radius: 8px; margin-bottom: 5px; cursor: pointer; }
        .nav-link-custom.active { background: #1e293b; color: white; }
        
        @media (max-width: 992px) {
            .sidebar { left: -260px; }
            .sidebar.active { left: 0; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h4 class="text-white fw-bold mb-4">SGP PRO</h4>
        <div class="nav-link-custom active" onclick="switchTab(this, 'pane-patrimonio')"><i class="fas fa-boxes me-2"></i> Patrimônio</div>
        <div class="nav-link-custom" onclick="switchTab(this, 'pane-historico')"><i class="fas fa-history me-2"></i> Histórico</div>
        <div class="mt-auto"><button class="btn btn-outline-danger w-100" onclick="fazerLogout()">Sair</button></div>
    </aside>

    <main class="main-content">
        <header class="d-flex align-items-center justify-content-between mb-4">
            <div class="d-flex align-items-center">
                <button class="btn btn-dark d-lg-none me-3" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <h3 class="fw-bold m-0">Painel</h3>
            </div>
            <div class="d-flex gap-2">
                <button id="btnInstalar" class="btn btn-outline-primary btn-sm d-none">INSTALAR</button>
                <button class="btn btn-primary btn-sm" onclick="abrirScanner()">SCANNER</button>
            </div>
        </header>

        <div id="pane-patrimonio" class="tab-pane active">
            <div class="card p-3 shadow-sm">
                <table class="table align-middle">
                    <thead><tr><th>Item</th><th>Ação</th></tr></thead>
                    <tbody id="listaPatrimonio"></tbody>
                </table>
             </div>
        </div>
    </main>

    <script>
        // Função para abrir/fechar menu no celular
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
        }

        // Fecha a sidebar ao clicar em um link no mobile
        function switchTab(el, id) {
            if(window.innerWidth < 992) toggleSidebar();
            document.querySelectorAll('.nav-link-custom').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            // Logica de troca de abas...
        }
    </script>
</body>
</html>
