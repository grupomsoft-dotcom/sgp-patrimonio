<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP PRO v3.8 - Gestão Patrimonial</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root { --bg: #f8fafc; --dark: #0f172a; --primary: #2563eb; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; margin: 0; }

        /* LOGIN */
        #telaLogin { position: fixed; inset: 0; background: var(--dark); z-index: 3000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 2.5rem; border-radius: 1.5rem; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }

        /* LAYOUT */
        .sidebar { width: 260px; height: 100vh; background: var(--dark); position: fixed; left: 0; top: 0; padding: 1.5rem; z-index: 1000; transition: 0.3s; }
        .main-content { margin-left: 260px; padding: 2rem; min-height: 100vh; }
        
        .nav-link-custom { display: flex; align-items: center; padding: 0.8rem 1rem; color: #94a3b8; border-radius: 0.5rem; text-decoration: none; margin-bottom: 0.5rem; cursor: pointer; transition: 0.2s; }
        .nav-link-custom:hover, .nav-link-custom.active { background: #1e293b; color: white; }
        .nav-link-custom i { margin-right: 12px; width: 20px; text-align: center; }

        /* COMPONENTES */
        .card { border: none; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 1.5rem; }
        .img-preview { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; cursor: pointer; border: 1px solid #ddd; }
        
        /* IMPRESSÃO RESTRITA */
        #areaImpressao { display: none; }
        @media print {
            body * { visibility: hidden !important; }
            #areaImpressao, #areaImpressao * { visibility: visible !important; display: block !important; }
            #areaImpressao { position: absolute; left: 0; top: 0; width: 100%; text-align: center; }
            .etiqueta-box { border: 2px solid #000; padding: 15px; display: inline-block !important; width: 260px; background: white !important; border-radius: 8px; }
            #qrcode canvas, #qrcode img { display: block !important; margin: 10px auto !important; }
        }

        @media (max-width: 992px) { .sidebar { left: -260px; } .main-content { margin-left: 0; } .sidebar.active { left: 0; } }
    </style>
</head>
<body>

    <div id="telaLogin">
        <div class="login-card text-center">
            <i class="fas fa-shield-halved fa-3x text-primary mb-3"></i>
            <h3 class="fw-bold">SGP PRO</h3>
            <form id="formLogin" class="mt-4 text-start">
                <div class="mb-3"><label class="small fw-bold">E-mail</label><input type="email" id="loginEmail" class="form-control" required></div>
                <div class="mb-4"><label class="small fw-bold">Senha</label><input type="password" id="loginSenha" class="form-control" required></div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">ACESSAR</button>
            </form>
        </div>
    </div>

    <div id="sistemaConteudo" style="display:none;">
        <aside class="sidebar">
            <h4 class="text-white fw-bold mb-5">SGP ADMIN</h4>
            <div class="nav-link-custom active" onclick="switchTab(this, 'pane-patrimonio')"><i class="fas fa-boxes-stacked"></i> Patrimônio</div>
            <div class="nav-link-custom" onclick="switchTab(this, 'pane-historico')"><i class="fas fa-history"></i> Histórico</div>
            <div class="nav-link-custom" onclick="switchTab(this, 'pane-congregacoes')"><i class="fas fa-church"></i> Unidades</div>
            <div class="mt-5 border-top border-secondary pt-4">
                <button class="btn btn-outline-danger btn-sm w-100" onclick="fazerLogout()">Sair</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <h3 class="fw-bold m-0">Painel de Controle</h3>
                <div class="d-flex gap-2">
                    <button id="btnInstalar" class="btn btn-outline-primary rounded-pill fw-bold d-none"><i class="fas fa-download me-1"></i> INSTALAR APP</button>
                    <button class="btn btn-primary px-4 rounded-pill shadow-sm fw-bold" onclick="abrirScanner()"><i class="fas fa-qrcode me-2"></i> ESCANEAR</button>
                </div>
            </header>

            <div class="tab-content">
                <div class="tab-pane fade show active" id="pane-patrimonio">
                    <div class="row g-4">
                        <div class="col-lg-4">
                            <div class="card p-4">
                                <h5 class="fw-bold mb-3">Novo Registro</h5>
                                <form id="formPatrimonio">
                                    <div class="mb-2"><label class="small fw-bold">Unidade</label><select id="patCongregacao" class="form-select" required></select></div>
                                    <div class="mb-2"><label class="small fw-bold">Nome do Bem</label><input type="text" id="patNome" class="form-control" required></div>
                                    <div class="mb-2"><label class="small fw-bold">Nº de Série</label><input type="text" id="patSerie" class="form-control"></div>
                                    <div class="mb-2"><label class="small fw-bold">Valor (R$)</label><input type="number" step="0.01" id="patValor" class="form-control" required></div>
                                    <div class="mb-3"><label class="small fw-bold">Foto</label><input type="file" id="patFoto" class="form-control" accept="image/*"></div>
                                    <button type="submit" class="btn btn-primary w-100 fw-bold">SALVAR ATIVO</button>
                                </form>
                            </div>
                        </div>
                        <div class="col-lg-8">
                            <div class="card p-4">
                                <input type="text" id="buscaPat" class="form-control mb-3 rounded-pill px-4" placeholder="🔍 Buscar por nome, série ou local..." onkeyup="filtrarPatrimonio()">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle">
                                        <thead><tr><th>Foto</th><th>Item / Série</th><th>Unidade</th><th>Ações</th></tr></thead>
                                        <tbody id="listaPatrimonio"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="tab-pane fade" id="pane-historico"><div class="card p-4"><h5>Movimentações</h5><hr><div id="listaHistoricoGlobal"></div></div></div>
                <div class="tab-pane fade" id="pane-congregacoes"><div class="card p-4"><h5>Unidades</h5><form id="formCongregacao" class="d-flex gap-2 my-3"><input type="text" id="congNome" class="form-control" placeholder="Nome"><button type="submit" class="btn btn-dark">Add</button></form><table class="table"><tbody id="listaCongregacoes"></tbody></table></div></div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="modalEdicao" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 1.5rem;">
                <div class="modal-header bg-dark text-white border-0 py-3 px-4" style="border-radius: 1.5rem 1.5rem 0 0;">
                    <h5 class="modal-title fw-bold">✏️ Editar Item</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formEdicaoDinamica">
                        <input type="hidden" id="editId">
                        <div class="mb-3"><label class="small fw-bold">Unidade</label><select id="editCongregacao" class="form-select bg-light border-0" required></select></div>
                        <div class="mb-3"><label class="small fw-bold">Nome do Bem</label><input type="text" id="editNome" class="form-control bg-light border-0" required></div>
                        <div class="mb-3"><label class="small fw-bold">Nº de Série</label><input type="text" id="editSerie" class="form-control bg-light border-0"></div>
                        <div class="mb-3"><label class="small fw-bold">Valor (R$)</label><input type="number" step="0.01" id="editValor" class="form-control bg-light border-0" required></div>
                        <div class="mb-4"><label class="small fw-bold">Trocar Foto</label><input type="file" id="editFoto" class="form-control bg-light border-0" accept="image/*"></div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary fw-bold py-2">ATUALIZAR DADOS</button>
                            <button type="button" class="btn btn-light fw-bold" data-bs-dismiss="modal">CANCELAR</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="areaImpressao">
        <div class="etiqueta-box">
            <div id="printIgreja" style="font-size: 9pt; font-weight: bold; border-bottom: 1px solid #000; text-transform: uppercase;"></div>
            <div id="qrcode"></div>
            <div id="printItem" style="font-size: 11pt; font-weight: bold; margin-top: 5px;"></div>
            <div id="printSerial" style="font-size: 8pt; color: #555;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="script.js"></script>
    <script>
        function switchTab(el, id) {
            document.querySelectorAll('.nav-link-custom').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('show', 'active'));
            document.getElementById(id).classList.add('show', 'active');
        }
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
