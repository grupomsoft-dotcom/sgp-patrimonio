<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP 2.0 - Sistema de Gestão de Patrimônio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-dark: #2c3e50; --accent-blue: #3498db; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        
        /* Login */
        #telaLogin { position: fixed; inset: 0; background: var(--primary-dark); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        
        /* Navbar & Tabs */
        #sistemaConteudo { display: none; }
        .nav-tabs .nav-link { color: #666; font-weight: 500; border: none; padding: 12px 25px; }
        .nav-tabs .nav-link.active { color: var(--accent-blue); border-bottom: 3px solid var(--accent-blue); background: transparent; }
        
        /* Cards */
        .dash-card { border: none; border-radius: 12px; color: white; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .bg-blue { background: linear-gradient(45deg, #2980b9, #3498db); }
        .bg-green { background: linear-gradient(45deg, #27ae60, #2ecc71); }
        .bg-purple { background: linear-gradient(45deg, #8e44ad, #9b59b6); }
        
        /* Table & Lists */
        .img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; background: #eee; }
        .card-header { font-weight: bold; background: white; border-bottom: 1px solid #eee; }
        .btn-action { padding: 2px 8px; }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="telaLogin">
        <div class="login-card text-center">
            <h2 class="mb-4">SGP 2.0</h2>
            <form id="formLogin">
                <input type="email" id="loginEmail" class="form-control mb-3" placeholder="E-mail" required>
                <input type="password" id="loginSenha" class="form-control mb-3" placeholder="Palavra-passe" required>
                <button type="submit" class="btn btn-primary w-100 py-2">Aceder ao Sistema</button>
                <div id="loginErro" class="text-danger mt-3 small"></div>
            </form>
        </div>
    </div>

    <!-- CONTEÚDO DO SISTEMA -->
    <div id="sistemaConteudo">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
            <div class="container">
                <a class="navbar-brand" href="#"><strong>SGP</strong> Patrimônio</a>
                <button class="btn btn-outline-light btn-sm" onclick="fazerLogout()">Sair</button>
            </div>
        </nav>

        <div class="container mt-4">
            <!-- Navegação por Abas -->
            <ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
                <li class="nav-link active" id="tab-patrimonio" data-bs-toggle="tab" data-bs-target="#pane-patrimonio" style="cursor:pointer">Património</li>
                <li class="nav-link" id="tab-congregacoes" data-bs-toggle="tab" data-bs-target="#pane-congregacoes" style="cursor:pointer">Congregações</li>
            </ul>

            <div class="tab-content">
                
                <!-- ABA 1: PATRIMÓNIO -->
                <div class="tab-pane fade show active" id="pane-patrimonio">
                    <!-- Dashboard Rápido -->
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <div class="card dash-card bg-blue"><div class="card-body"><h6>Total Itens</h6><h2 id="dashItens">0</h2></div></div>
                        </div>
                        <div class="col-md-4">
                            <div class="card dash-card bg-green"><div class="card-body"><h6>Valor Total</h6><h2 id="dashValor">R$ 0,00</h2></div></div>
                        </div>
                        <div class="col-md-4">
                            <div class="card dash-card bg-purple"><div class="card-body"><h6>Maior Unidade</h6><h2 id="dashUnidade">--</h2></div></div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-lg-4">
                            <div class="card shadow-sm mb-4">
                                <div class="card-header">Registar Bem</div>
                                <div class="card-body">
                                    <form id="formPatrimonio">
                                        <input type="hidden" id="patId">
                                        <div class="mb-2">
                                            <label class="small">Congregação</label>
                                            <select id="patCongregacao" class="form-select form-select-sm" required>
                                                <option value="">A carregar unidades...</option>
                                            </select>
                                        </div>
                                        <div class="mb-2"><label class="small">Nome do Item</label><input type="text" id="patNome" class="form-control form-control-sm" required></div>
                                        <div class="mb-2"><label class="small">Valor (R$)</label><input type="number" step="0.01" id="patValor" class="form-control form-control-sm" required></div>
                                        <div class="mb-2"><label class="small">Observações</label><textarea id="patObs" class="form-control form-control-sm"></textarea></div>
                                        <div class="mb-3"><label class="small">Foto</label><input type="file" id="patFoto" class="form-control form-control-sm" accept="image/*"></div>
                                        <button type="submit" id="btnSalvarPat" class="btn btn-primary btn-sm w-100">Guardar Item</button>
                                        <button type="button" id="btnCancelaPat" class="btn btn-light btn-sm w-100 mt-1 d-none" onclick="resetaPatrimonio()">Cancelar</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-8">
                            <div class="card shadow-sm">
                                <div class="card-body">
                                    <div class="d-flex gap-2 mb-3">
                                        <input type="text" id="buscaPat" class="form-control form-control-sm" placeholder="Procurar item..." onkeyup="filtrarPatrimonio()">
                                        <button class="btn btn-success btn-sm" onclick="exportarExcel()">Excel</button>
                                    </div>
                                    <div class="table-responsive">
                                        <table class="table table-hover align-middle small">
                                            <thead><tr class="table-light"><th>Foto</th><th>Item</th><th>Unidade</th><th>Valor</th><th>Ações</th></tr></thead>
                                            <tbody id="listaPatrimonio"></tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ABA 2: CONGREGAÇÕES -->
                <div class="tab-pane fade" id="pane-congregacoes">
                    <div class="row">
                        <div class="col-lg-4">
                            <div class="card shadow-sm mb-4">
                                <div class="card-header">Nova Congregação</div>
                                <div class="card-body">
                                    <form id="formCongregacao">
                                        <input type="hidden" id="congId">
                                        <div class="mb-2"><label class="small">Nome da Unidade</label><input type="text" id="congNome" class="form-control form-control-sm" required placeholder="Ex: Sede Central"></div>
                                        <div class="mb-2"><label class="small">Responsável</label><input type="text" id="congResponsavel" class="form-control form-control-sm" placeholder="Ex: Pr. João"></div>
                                        <div class="mb-3"><label class="small">Cidade/Localidade</label><input type="text" id="congLocal" class="form-control form-control-sm"></div>
                                        <button type="submit" id="btnSalvarCong" class="btn btn-dark btn-sm w-100">Registar Unidade</button>
                                        <button type="button" id="btnCancelaCong" class="btn btn-light btn-sm w-100 mt-1 d-none" onclick="resetaCongregacao()">Cancelar</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-8">
                            <div class="card shadow-sm">
                                <div class="card-body">
                                    <h6 class="mb-3">Unidades Cadastradas</h6>
                                    <div class="table-responsive">
                                        <table class="table table-sm table-hover align-middle">
                                            <thead><tr class="table-light"><th>Unidade</th><th>Responsável</th><th>Local</th><th>Ações</th></tr></thead>
                                            <tbody id="listaCongregacoes"></tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
